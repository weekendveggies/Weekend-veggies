<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend Veggies — Admin Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --paper: #FBF6EC;
    --paper-dim: #F3EBDA;
    --ink: #143B22;
    --ink-soft: #52684F;
    --green: #5FA82A;
    --green-dark: #1F5C2E;
    --tomato: #C1442D;
    --carrot: #DB8A1F;
    --line: rgba(36,48,31,0.14);
    --card: #FFFFFF;
    --shadow: 0 2px 0 rgba(36,48,31,0.06), 0 10px 24px -12px rgba(36,48,31,0.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  h1,h2,.display{font-family:Georgia,"Times New Roman",serif; font-weight:700; letter-spacing:-0.01em;}
  button{font-family:inherit; cursor:pointer;}

  /* ---- Login screen ---- */
  .login-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:32px 28px; width:100%; max-width:340px; box-shadow:var(--shadow);
  }
  .login-card h1{font-size:22px; margin:0 0 4px;}
  .login-card p{font-size:13px; color:var(--ink-soft); margin:0 0 20px;}
  .login-card label{display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); margin:14px 0 6px;}
  .login-card input{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:9px; font-size:14px;
  }
  .login-btn{
    width:100%; margin-top:20px; background:var(--green); color:#fff; border:none;
    padding:12px; border-radius:9px; font-weight:700; font-size:14px;
  }
  .login-error{color:var(--tomato); font-size:12.5px; margin-top:10px; display:none;}

  /* ---- Dashboard ---- */
  .topbar{
    background:var(--ink); color:var(--paper); padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .topbar .display{font-size:19px;}
  .logout-btn{
    background:none; border:1px solid rgba(255,255,255,0.3); color:var(--paper);
    padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:600;
  }
  .tabs{
    max-width:1100px; margin:18px auto 0; padding:0 20px;
    display:flex; gap:10px;
  }
  .tab-btn{
    border:1.5px solid var(--line); background:var(--card); color:var(--ink-soft);
    padding:8px 16px; border-radius:999px; font-weight:600; font-size:13.5px;
  }
  .tab-btn.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .panel{max-width:1100px; margin:0 auto; padding:16px 20px 60px;}
  .panel-section{display:none;}
  .panel-section.show{display:block;}

  .empty-state{
    text-align:center; color:var(--ink-soft); padding:60px 20px; font-size:14px;
    background:var(--card); border-radius:14px; border:1px solid var(--line);
  }

  .order-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; margin-bottom:14px; box-shadow:var(--shadow);
  }
  .order-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;}
  .order-cust{font-weight:700; font-size:15.5px;}
  .order-meta{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .order-total{font-size:19px; font-weight:700; font-family:Georgia,serif; white-space:nowrap;}
  .order-items{margin:12px 0; padding:12px 0; border-top:1px dashed var(--line); border-bottom:1px dashed var(--line);}
  .order-item-row{display:flex; justify-content:space-between; font-size:13.5px; padding:3px 0;}
  .order-footer{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
  .badge{
    display:inline-block; padding:4px 10px; border-radius:999px; font-size:11.5px; font-weight:700;
  }
  .badge-New{background:#FDEDEA; color:var(--tomato);}
  .badge-Confirmed{background:#FFF3DE; color:var(--carrot);}
  .badge-OutforDelivery{background:#E4EEFB; color:#2A5DAB;}
  .badge-Delivered{background:#E8F3DE; color:var(--green-dark);}
  .status-select{
    border:1.5px solid var(--line); border-radius:8px; padding:7px 10px; font-size:12.5px; font-weight:600;
    background:var(--card); color:var(--ink);
  }

  table{width:100%; border-collapse:collapse; background:var(--card); border-radius:14px; overflow:hidden; box-shadow:var(--shadow);}
  th,td{text-align:left; padding:11px 14px; font-size:13.5px; border-bottom:1px solid var(--line);}
  th{background:var(--paper-dim); color:var(--ink-soft); font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em;}
  tr:last-child td{border-bottom:none;}

  @media (max-width:600px){
    table, thead, tbody, th, td, tr{display:block;}
    thead{display:none;}
    tr{margin-bottom:12px; border-bottom:8px solid var(--paper); }
    td{border:none; padding:6px 14px;}
    td::before{content:attr(data-label); display:block; font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em;}
  }

  /* ---- Products tab ---- */
  .products-toolbar{display:flex; justify-content:flex-end; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
  .btn{
    border:none; border-radius:9px; padding:9px 16px; font-weight:700; font-size:13px;
  }
  .btn-primary{background:var(--green); color:#fff;}
  .btn-outline{background:var(--card); color:var(--ink); border:1.5px solid var(--line);}
  .add-product-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; margin-bottom:18px; box-shadow:var(--shadow); display:none;
  }
  .add-product-card.show{display:block;}
  .add-product-card h3{margin:0 0 12px; font-size:16px;}
  .pform-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px;}
  .pform-grid label{font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); display:block; margin-bottom:4px;}
  .pform-grid input, .pform-grid select{
    width:100%; padding:9px 10px; border:1.5px solid var(--line); border-radius:8px; font-size:13.5px;
  }
  .pform-actions{margin-top:14px; display:flex; gap:10px;}
  .prod-row{
    display:flex; align-items:center; gap:12px; background:var(--card);
    border:1px solid var(--line); border-radius:12px; padding:10px 14px; margin-bottom:10px;
  }
  .prod-icon{font-size:26px; width:34px; text-align:center;}
  .prod-info{flex:1; min-width:0;}
  .prod-name{font-weight:700; font-size:14px;}
  .prod-sub{font-size:12px; color:var(--ink-soft);}
  .prod-price-input{width:80px; padding:7px 8px; border:1.5px solid var(--line); border-radius:8px; font-size:13.5px; font-weight:700;}
  .prod-unit-input{width:70px; padding:7px 8px; border:1.5px solid var(--line); border-radius:8px; font-size:13.5px;}
  .icon-btn{background:none; border:none; font-size:16px; padding:6px; cursor:pointer; color:var(--ink-soft);}
  .icon-btn:hover{color:var(--tomato);}
  @media (max-width:640px){
    .prod-row{flex-wrap:wrap;}
  }

  /* ---- Stats bar ---- */
  .stats-bar{
    max-width:1100px; margin:14px auto 0; padding:0 20px;
    display:flex; gap:12px; flex-wrap:wrap;
  }
  .stat-card{
    flex:1; min-width:140px; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:12px 16px; box-shadow:var(--shadow);
  }
  .stat-label{font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); font-weight:700;}
  .stat-value{font-size:22px; font-weight:700; font-family:Georgia,serif; margin-top:2px;}

  /* ---- Search boxes ---- */
  .search-row{max-width:1100px; margin:0 auto 14px; padding:0 20px; display:flex; gap:10px; flex-wrap:wrap;}
  .search-input{
    flex:1; min-width:200px; padding:10px 14px; border:1.5px solid var(--line);
    border-radius:9px; font-size:13.5px; background:var(--card);
  }

  /* ---- Area grouping ---- */
  .area-group-header{
    font-weight:700; font-size:13.5px; color:var(--ink-soft); text-transform:uppercase;
    letter-spacing:0.04em; margin:20px 0 10px; padding-bottom:6px; border-bottom:2px solid var(--line);
  }
  .area-group-header:first-child{margin-top:0;}

  /* ---- Print view (parcel slips) ---- */
  #printArea{display:none;}
  .parcel-slip{
    border:2px dashed var(--ink); border-radius:10px; padding:16px 18px;
    margin-bottom:16px; page-break-inside:avoid;
  }
  .parcel-slip h3{margin:0 0 4px; font-size:18px;}
  .parcel-order-no{font-size:13px; color:var(--ink-soft); margin-bottom:10px;}
  .parcel-row{font-size:14px; margin:4px 0;}
  .parcel-items{margin:10px 0; padding:10px 0; border-top:1px dashed var(--line); border-bottom:1px dashed var(--line);}
  .parcel-item-row{display:flex; justify-content:space-between; font-size:13.5px; padding:2px 0;}
  .parcel-checks{margin-top:10px; font-size:13px; display:flex; gap:20px;}

  @media print{
    body *{ visibility:hidden; }
    #printArea, #printArea *{ visibility:visible; }
    #printArea{
      display:block; position:absolute; top:0; left:0; width:100%;
    }
  }
</style>
</head>
<body>

<!-- ===== Login screen ===== -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1 class="display">Weekend Veggies</h1>
    <p>Staff login — admin dashboard</p>
    <label for="loginEmail">Email</label>
    <input id="loginEmail" type="email" placeholder="you@example.com">
    <label for="loginPass">Password</label>
    <input id="loginPass" type="password" placeholder="Your password">
    <button class="login-btn" onclick="doLogin()">Log in</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== Dashboard (hidden until logged in) ===== -->
<div id="dashboard" style="display:none;">
  <div class="topbar">
    <div class="display">Weekend Veggies · Admin</div>
    <button class="logout-btn" onclick="doLogout()">Log out</button>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Today's orders</div>
      <div class="stat-value" id="statTodayOrders">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today's revenue</div>
      <div class="stat-value" id="statTodayRevenue">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending deliveries</div>
      <div class="stat-value" id="statPendingCount">—</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabPendingBtn" onclick="showTab('pending')">🚚 Pending Deliveries</button>
    <button class="tab-btn" id="tabHistoryBtn" onclick="showTab('history')">🗂 Order History</button>
    <button class="tab-btn" id="tabCustomersBtn" onclick="showTab('customers')">👤 Customers</button>
    <button class="tab-btn" id="tabProductsBtn" onclick="showTab('products')">🥕 Products</button>
  </div>

  <div class="search-row">
    <input class="search-input" id="orderSearchInput" placeholder="🔍 Search orders by name, phone, or order number..." oninput="renderOrderTabs()">
  </div>

  <div class="panel">
    <div class="panel-section show" id="pendingPanel">
      <div class="products-toolbar">
        <button class="btn btn-outline" onclick="exportOrdersCsv()">⬇️ Export all orders (CSV)</button>
        <button class="btn btn-outline" onclick="printPendingOrders()">🖨️ Print all pending orders</button>
      </div>
      <div id="pendingList"></div>
    </div>
    <div class="panel-section" id="historyPanel">
      <div id="historyList"></div>
    </div>
    <div class="panel-section" id="customersPanel">
      <div class="search-row" style="margin:0 0 14px; padding:0;">
        <input class="search-input" id="customerSearchInput" placeholder="🔍 Search customers by name or phone..." oninput="renderCustomersTable()">
      </div>
      <table>
        <thead><tr><th>Name</th><th>Phone</th><th>Address</th><th>Area</th><th>Location</th><th>Last updated</th></tr></thead>
        <tbody id="customersTableBody"></tbody>
      </table>
      <div id="customersEmpty"></div>
    </div>
    <div class="panel-section" id="productsPanel">
      <div class="products-toolbar">
        <button class="btn btn-outline" id="seedBtn" onclick="seedProducts()">🌱 Load starter list (one-time)</button>
        <button class="btn btn-primary" onclick="toggleAddForm()">➕ Add vegetable</button>
      </div>
      <div class="add-product-card" id="addProductCard">
        <h3>Add a new vegetable</h3>
        <div class="pform-grid">
          <div>
            <label>Name (English)</label>
            <input id="newName" placeholder="e.g. Radish">
          </div>
          <div>
            <label>Name (Telugu)</label>
            <input id="newTe" placeholder="e.g. ముల్లంగి">
          </div>
          <div>
            <label>Emoji icon</label>
            <input id="newIcon" placeholder="e.g. 🥕">
          </div>
          <div>
            <label>Category</label>
            <select id="newCat">
              <option value="leafy">Leafy Greens</option>
              <option value="root">Root Veg</option>
              <option value="gourd">Gourds &amp; Beans</option>
              <option value="exotic">Exotic</option>
              <option value="salad">Salad &amp; Kitchen</option>
            </select>
          </div>
          <div>
            <label>Price (₹)</label>
            <input id="newPrice" type="number" placeholder="40">
          </div>
          <div>
            <label>Unit</label>
            <input id="newUnit" placeholder="kg / bunch / pc">
          </div>
          <div>
            <label>Photo URL (optional)</label>
            <input id="newPhoto" placeholder="https://...">
          </div>
        </div>
        <div class="pform-actions">
          <button class="btn btn-primary" onclick="addProduct()">Save vegetable</button>
          <button class="btn btn-outline" onclick="toggleAddForm()">Cancel</button>
        </div>
      </div>
      <div id="productsList"></div>
    </div>
  </div>
</div>

<div id="printArea"></div>

<script>
/* Paste the SAME firebaseConfig you used in weekend-veggies.html */
const firebaseConfig = {
  apiKey: "AIzaSyAeeG6BEUCugDNOkqsxe34sH1PituGN65o",
  authDomain: "weekend-veggies.firebaseapp.com",
  projectId: "weekend-veggies",
  storageBucket: "weekend-veggies.firebasestorage.app",
  messagingSenderId: "114138191278",
  appId: "1:114138191278:web:972aef04f98f8bdb4da43f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ordersUnsub = null;
let customersUnsub = null;
let productsUnsub = null;
let allOrderDocs = [];
let allCustomerDocs = [];

const CATEGORY_NAMES = {
  leafy:"Leafy Greens", root:"Root Veg", gourd:"Gourds & Beans",
  exotic:"Exotic", salad:"Salad & Kitchen"
};

// One-time starter list — only used if you click "Load starter list" with an empty catalog
const STARTER_PRODUCTS = [
  { name:"Tomato", te:"టమాటా", icon:"🍅", cat:"salad", price:40, unit:"kg" },
  { name:"Onion", te:"ఉల్లిపాయ", icon:"🧅", cat:"root", price:35, unit:"kg" },
  { name:"Potato", te:"బంగాళదుంప", icon:"🥔", cat:"root", price:28, unit:"kg" },
  { name:"Carrot", te:"క్యారెట్", icon:"🥕", cat:"root", price:45, unit:"kg" },
  { name:"Spinach", te:"పాలకూర", icon:"🥬", cat:"leafy", price:25, unit:"bunch" },
  { name:"Coriander", te:"కొత్తిమీర", icon:"🌿", cat:"leafy", price:10, unit:"bunch" },
  { name:"Fenugreek Leaves", te:"మెంతికూర", icon:"🍀", cat:"leafy", price:20, unit:"bunch" },
  { name:"Brinjal", te:"వంకాయ", icon:"🍆", cat:"exotic", price:38, unit:"kg" },
  { name:"Capsicum", te:"క్యాప్సికం", icon:"🫑", cat:"salad", price:55, unit:"kg" },
  { name:"Cucumber", te:"దోసకాయ", icon:"🥒", cat:"salad", price:30, unit:"kg" },
  { name:"Cauliflower", te:"కాలీఫ్లవర్", icon:"🥦", cat:"gourd", price:35, unit:"pc" },
  { name:"Broccoli", te:"బ్రోకలీ", icon:"🥦", cat:"exotic", price:80, unit:"kg" },
  { name:"Beans", te:"చిక్కుడు కాయలు", icon:"🫛", cat:"gourd", price:48, unit:"kg" },
  { name:"Bottle Gourd", te:"సొరకాయ", icon:"🥒", cat:"gourd", price:32, unit:"pc" },
  { name:"Ginger", te:"అల్లం", icon:"🫚", cat:"exotic", price:90, unit:"250g" },
  { name:"Garlic", te:"వెల్లుల్లి", icon:"🧄", cat:"exotic", price:70, unit:"250g" },
  { name:"Green Chilli", te:"పచ్చిమిర్చి", icon:"🌶️", cat:"salad", price:15, unit:"250g" },
  { name:"Lemon", te:"నిమ్మకాయ", icon:"🍋", cat:"salad", price:8, unit:"pc" },
];

function doLogin(){
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value;
  const errEl = document.getElementById("loginError");
  errEl.style.display = "none";
  auth.signInWithEmailAndPassword(email, pass).catch(err=>{
    errEl.textContent = "Login failed — check your email and password.";
    errEl.style.display = "block";
  });
}
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    attachListeners();
  } else {
    document.getElementById("loginWrap").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
    if(ordersUnsub) ordersUnsub();
    if(customersUnsub) customersUnsub();
    if(productsUnsub) productsUnsub();
  }
});

function showTab(tab){
  document.getElementById("tabPendingBtn").classList.toggle("active", tab==="pending");
  document.getElementById("tabHistoryBtn").classList.toggle("active", tab==="history");
  document.getElementById("tabCustomersBtn").classList.toggle("active", tab==="customers");
  document.getElementById("tabProductsBtn").classList.toggle("active", tab==="products");
  document.getElementById("pendingPanel").classList.toggle("show", tab==="pending");
  document.getElementById("historyPanel").classList.toggle("show", tab==="history");
  document.getElementById("customersPanel").classList.toggle("show", tab==="customers");
  document.getElementById("productsPanel").classList.toggle("show", tab==="products");
}

function orderMatchesSearch(o, q){
  if(!q) return true;
  q = q.toLowerCase();
  return (o.name||"").toLowerCase().includes(q)
      || (o.phone||"").toLowerCase().includes(q)
      || (o.orderNumber||"").toLowerCase().includes(q);
}

function renderOrderTabs(){
  const q = (document.getElementById("orderSearchInput").value || "").trim();
  const pendingList = document.getElementById("pendingList");
  const historyList = document.getElementById("historyList");

  const pendingDocs = allOrderDocs.filter(d => (d.data().status || "New") !== "Delivered" && orderMatchesSearch(d.data(), q));
  const historyDocs = allOrderDocs.filter(d => (d.data().status || "New") === "Delivered" && orderMatchesSearch(d.data(), q));

  // Group pending orders by delivery area, so staff can pack/deliver zone by zone
  if(pendingDocs.length === 0){
    pendingList.innerHTML = `<div class="empty-state">${q ? "No matching pending orders." : "No pending deliveries. New orders will appear here in real time."}</div>`;
  } else {
    const groups = {};
    pendingDocs.forEach(d=>{
      const area = d.data().area || "No area specified";
      if(!groups[area]) groups[area] = [];
      groups[area].push(d);
    });
    const areaNames = Object.keys(groups).sort();
    pendingList.innerHTML = areaNames.map(area => `
      <div class="area-group-header">📍 ${area} (${groups[area].length})</div>
      ${groups[area].map(orderCardHtml).join("")}
    `).join("");
  }

  historyList.innerHTML = historyDocs.length
    ? historyDocs.map(orderCardHtml).join("")
    : `<div class="empty-state">${q ? "No matching orders in history." : "No delivered orders yet."}</div>`;

  updateStats();
}

function updateStats(){
  const today = new Date().toDateString();
  const todayDocs = allOrderDocs.filter(d=>{
    const o = d.data();
    return o.createdAt && o.createdAt.toDate && o.createdAt.toDate().toDateString() === today;
  });
  const todayRevenue = todayDocs.reduce((sum,d)=> sum + (d.data().total || 0), 0);
  const pendingCount = allOrderDocs.filter(d => (d.data().status || "New") !== "Delivered").length;

  document.getElementById("statTodayOrders").textContent = todayDocs.length;
  document.getElementById("statTodayRevenue").textContent = "₹" + todayRevenue;
  document.getElementById("statPendingCount").textContent = pendingCount;
}

function exportOrdersCsv(){
  if(allOrderDocs.length === 0){
    alert("No orders to export yet.");
    return;
  }
  const escape = (val) => `"${String(val ?? "").replace(/"/g,'""')}"`;
  const header = ["Order Number","Date","Status","Name","Phone","Address","Area","Slot","Items","Total","Note"];
  const rows = allOrderDocs.map(doc=>{
    const o = doc.data();
    const when = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate().toLocaleString() : "";
    const itemsStr = (o.items||[]).map(it=>`${it.name} x${it.qty}${it.unit}`).join("; ");
    return [
      o.orderNumber || doc.id, when, o.status || "New", o.name || "", o.phone || "",
      o.address || "", o.area || "", o.slot || "", itemsStr, o.total || 0, o.note || ""
    ].map(escape).join(",");
  });
  const csv = [header.map(escape).join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `weekend-veggies-orders-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function orderCardHtml(doc){
  const o = doc.data();
  const when = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate().toLocaleString() : "Just now";
  const status = o.status || "New";
  const orderNo = o.orderNumber || doc.id;
  const itemsHtml = (o.items||[]).map(it=>`
    <div class="order-item-row"><span>${it.name}${it.te ? " / "+it.te : ""} × ${it.qty} ${it.unit}</span><span>₹${it.lineTotal}</span></div>
  `).join("");
  const mapLink = (o.lat && o.lng) ? `<a href="https://maps.google.com/?q=${o.lat},${o.lng}" target="_blank" style="color:var(--green-dark); font-weight:600;">📍 View location</a>` : "";
  return `
  <div class="order-card">
    <div class="order-head">
      <div>
        <div class="order-cust">${o.name || "—"} <span style="color:var(--ink-soft); font-weight:400;">· ${orderNo}</span></div>
        <div class="order-meta">${o.phone || ""} · ${o.area || ""} · ${o.slot || ""}</div>
        <div class="order-meta">${when}</div>
      </div>
      <div class="order-total">₹${o.total || 0}</div>
    </div>
    <div class="order-items">${itemsHtml}</div>
    ${o.address ? `<div class="order-meta" style="margin-bottom:6px;">📍 ${o.address}</div>` : ""}
    ${mapLink ? `<div class="order-meta" style="margin-bottom:6px;">${mapLink}</div>` : ""}
    ${o.note ? `<div class="order-meta" style="margin-bottom:10px;">📝 ${o.note}</div>` : ""}
    <div class="order-footer">
      <span class="badge badge-${status.replace(/\s/g,'')}">${status}</span>
      <select class="status-select" onchange="updateStatus('${doc.id}', this.value)">
        <option value="New" ${status==="New"?"selected":""}>New</option>
        <option value="Confirmed" ${status==="Confirmed"?"selected":""}>Confirmed</option>
        <option value="Out for Delivery" ${status==="Out for Delivery"?"selected":""}>Out for Delivery</option>
        <option value="Delivered" ${status==="Delivered"?"selected":""}>Delivered</option>
      </select>
    </div>
  </div>`;
}

function customerMatchesSearch(c, id, q){
  if(!q) return true;
  q = q.toLowerCase();
  return (c.name||"").toLowerCase().includes(q) || (c.phone||id||"").toLowerCase().includes(q);
}

function renderCustomersTable(){
  const q = (document.getElementById("customerSearchInput").value || "").trim();
  const tbody = document.getElementById("customersTableBody");
  const emptyEl = document.getElementById("customersEmpty");
  const filtered = allCustomerDocs.filter(doc => customerMatchesSearch(doc.data(), doc.id, q));

  if(filtered.length === 0){
    tbody.innerHTML = "";
    emptyEl.innerHTML = `<div class="empty-state">${q ? "No matching customers." : "No customers yet."}</div>`;
    return;
  }
  emptyEl.innerHTML = "";
  tbody.innerHTML = filtered.map(doc=>{
    const c = doc.data();
    const when = c.updatedAt && c.updatedAt.toDate ? c.updatedAt.toDate().toLocaleDateString() : "";
    const mapLink = (c.lat && c.lng) ? `<a href="https://maps.google.com/?q=${c.lat},${c.lng}" target="_blank" style="color:var(--green-dark); font-weight:600;">📍 Map</a>` : "—";
    return `
    <tr>
      <td data-label="Name">${c.name || "—"}</td>
      <td data-label="Phone">${c.phone || doc.id}</td>
      <td data-label="Address">${c.address || "—"}</td>
      <td data-label="Area">${c.area || "—"}</td>
      <td data-label="Location">${mapLink}</td>
      <td data-label="Last updated">${when}</td>
    </tr>`;
  }).join("");
}

function attachListeners(){
  ordersUnsub = db.collection("orders").orderBy("createdAt","desc").onSnapshot(snap=>{
    allOrderDocs = snap.docs;
    renderOrderTabs();
  });

  customersUnsub = db.collection("customers").orderBy("updatedAt","desc").onSnapshot(snap=>{
    allCustomerDocs = snap.docs;
    renderCustomersTable();
  });
  productsUnsub = db.collection("products").orderBy("name").onSnapshot(snap=>{
    const list = document.getElementById("productsList");
    if(snap.empty){
      list.innerHTML = `<div class="empty-state">No vegetables yet. Click "Load starter list" for a ready-made catalog, or "Add vegetable" to start from scratch.</div>`;
      return;
    }
    list.innerHTML = snap.docs.map(doc=>{
      const p = doc.data();
      const outOfStock = p.inStock === false;
      return `
      <div class="prod-row" style="${outOfStock ? 'opacity:0.55;' : ''}">
        <div class="prod-icon">${p.icon || "🥬"}</div>
        <div class="prod-info">
          <div class="prod-name">${p.name}${p.te ? " / "+p.te : ""} ${outOfStock ? '<span style="color:var(--tomato); font-weight:700; font-size:11.5px;">· OUT OF STOCK</span>' : ''}</div>
          <div class="prod-sub">${CATEGORY_NAMES[p.cat] || p.cat}</div>
        </div>
        <span style="font-size:12.5px; color:var(--ink-soft);">₹</span>
        <input class="prod-price-input" type="number" value="${p.price}"
          onchange="updateProductField('${doc.id}','price', Number(this.value))">
        <input class="prod-unit-input" value="${p.unit || ''}"
          onchange="updateProductField('${doc.id}','unit', this.value)">
        <button class="btn btn-outline" style="padding:6px 10px; font-size:12px;" onclick="updateProductField('${doc.id}','inStock', ${outOfStock})">${outOfStock ? '✅ Back in stock' : '🚫 Mark out of stock'}</button>
      </div>`;
    }).join("");
  });
}

function toggleAddForm(){
  document.getElementById("addProductCard").classList.toggle("show");
}

async function addProduct(){
  const name = document.getElementById("newName").value.trim();
  const te = document.getElementById("newTe").value.trim();
  const icon = document.getElementById("newIcon").value.trim() || "🥬";
  const cat = document.getElementById("newCat").value;
  const price = Number(document.getElementById("newPrice").value);
  const unit = document.getElementById("newUnit").value.trim() || "kg";
  const photo = document.getElementById("newPhoto").value.trim();

  if(!name || !price){
    alert("Please enter at least a name and a price.");
    return;
  }
  const data = { name, te, icon, cat, price, unit, inStock: true };
  if(photo) data.photo = photo;

  try{
    await db.collection("products").add(data);
    document.getElementById("newName").value = "";
    document.getElementById("newTe").value = "";
    document.getElementById("newIcon").value = "";
    document.getElementById("newPrice").value = "";
    document.getElementById("newUnit").value = "";
    document.getElementById("newPhoto").value = "";
    toggleAddForm();
  } catch(err){
    alert("Couldn't add the vegetable — please try again.");
    console.error(err);
  }
}

function updateProductField(productId, field, value){
  db.collection("products").doc(productId).update({ [field]: value }).catch(err=>{
    alert("Couldn't save that change — check your connection and try again.");
    console.error(err);
  });
}

async function seedProducts(){
  const existing = await db.collection("products").limit(1).get();
  if(!existing.empty){
    alert("Your catalog already has vegetables in it, so the starter list won't be added again. Use 'Add vegetable' for new items.");
    return;
  }
  if(!confirm(`This will add ${STARTER_PRODUCTS.length} starter vegetables to your catalog. Continue?`)) return;
  const btn = document.getElementById("seedBtn");
  btn.disabled = true; btn.textContent = "Loading...";
  try{
    const batch = db.batch();
    STARTER_PRODUCTS.forEach(p=>{
      const ref = db.collection("products").doc();
      batch.set(ref, p);
    });
    await batch.commit();
  } catch(err){
    alert("Couldn't load the starter list — please try again.");
    console.error(err);
  }
  btn.disabled = false; btn.textContent = "🌱 Load starter list (one-time)";
}

const STATUS_MESSAGES = {
  "Confirmed": (o) => `Hi ${o.name}! Your Weekend Veggies order ${o.orderNumber || ""} (₹${o.total}) is confirmed for ${o.slot}. We'll message you again when it's out for delivery. Thank you! 🥬`,
  "Out for Delivery": (o) => `Hi ${o.name}! Your Weekend Veggies order ${o.orderNumber || ""} is out for delivery and should reach you soon at ${o.area}. 🚚`,
  "Delivered": (o) => `Hi ${o.name}! Your Weekend Veggies order ${o.orderNumber || ""} has been delivered. Thank you for ordering with us — see you next weekend! 🥬`
};

async function updateStatus(orderId, status){
  try{
    await db.collection("orders").doc(orderId).update({ status });
  } catch(err){
    alert("Couldn't update status — check your connection and try again.");
    console.error(err);
    return;
  }
  // For these stages, open a pre-filled WhatsApp message to the customer — you just tap Send
  const template = STATUS_MESSAGES[status];
  if(template){
    try{
      const doc = await db.collection("orders").doc(orderId).get();
      const o = doc.data();
      if(o && o.phone){
        const msg = template(o);
        window.open(`https://wa.me/${o.phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, "_blank");
      }
    } catch(err){ console.error(err); }
  }
}

function printPendingOrders(){
  const printArea = document.getElementById("printArea");
  db.collection("orders").orderBy("createdAt","desc").get().then(snap=>{
    const pending = snap.docs.filter(d => (d.data().status || "New") !== "Delivered");
    if(pending.length === 0){
      alert("No pending orders to print.");
      return;
    }
    printArea.innerHTML = pending.map(doc=>{
      const o = doc.data();
      const orderNo = o.orderNumber || doc.id;
      const itemsHtml = (o.items||[]).map(it=>`
        <div class="parcel-item-row"><span>${it.name}${it.te ? " / "+it.te : ""} × ${it.qty} ${it.unit}</span><span>₹${it.lineTotal}</span></div>
      `).join("");
      return `
      <div class="parcel-slip">
        <h3>${o.name || "—"}</h3>
        <div class="parcel-order-no">Order ${orderNo} · ${o.status || "New"}</div>
        <div class="parcel-row"><strong>Phone:</strong> ${o.phone || ""}</div>
        <div class="parcel-row"><strong>Address:</strong> ${o.address || ""}</div>
        <div class="parcel-row"><strong>Area / Slot:</strong> ${o.area || ""} · ${o.slot || ""}</div>
        ${o.note ? `<div class="parcel-row"><strong>Note:</strong> ${o.note}</div>` : ""}
        <div class="parcel-items">${itemsHtml}</div>
        <div class="parcel-row"><strong>Total: ₹${o.total || 0}</strong></div>
        <div class="parcel-checks">
          <span>☐ Packed</span>
          <span>☐ Checked</span>
          <span>☐ Loaded</span>
        </div>
      </div>`;
    }).join("");
    window.print();
  }).catch(err=>{
    alert("Couldn't load orders to print — please try again.");
    console.error(err);
  });
}
</script>
